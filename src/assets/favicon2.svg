<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220">
  <defs>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"></stop>
      <stop offset="50%" stop-color="#d9d9d9"></stop>
      <stop offset="100%" stop-color="#9a9a9a"></stop>
    </linearGradient>

    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3b3b"></stop>
      <stop offset="100%" stop-color="#b30000"></stop>
    </linearGradient>
  </defs>

  <!-- Car outline -->
  <path d="M90 85
       C170 35, 280 35, 355 65
       C430 95, 520 100, 620 85" fill="none" stroke="url(#silver)" stroke-width="8" stroke-linecap="round"></path>

  <!-- Red accent -->
  <path d="M120 98
       C210 120, 340 110, 505 88
       C560 82, 600 90, 645 112" fill="none" stroke="url(#red)" stroke-width="5" stroke-linecap="round"></path>

  <!-- Text -->
  <text x="80" y="190" font-family="Arial, Helvetica, sans-serif" font-size="110" font-weight="900" fill="url(#silver)">
    DBM
  </text>

  <text x="515" y="190" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="900" fill="url(#red)">
    4
  </text>
</svg>